<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fibonacci y Números Primos</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">Generador básico de claves seguras usando Fibonacci y números primos</div>
    
        <ul class="menu">
            <li><a href="index.html">Desafio</a></li>
        </ul>
    </nav>
    
    <div class="contenedor">
        <h1>Mas seguridad para todos :></h1>
    
        <form>
            <label>(A)Ingrese un numero inicial</label>
            <input type="number" id="inicial" value="5"/>
        
            <label>(B)Ingrese un numero segundario(mayor que A)</label>
            <input type="number" id="secundario" value="9"/>
        
            <label>(C)Cantidad de Iteraciones</label>
            <input type="number" id="iteraciones" value="20"/>

            <table style="margin-top: 5px; margin-bottom: 10px">
                <tr>
                    <th>(P)Contraseña Generada </th>
                    <th id="password"></th>
                </tr>
            </table>

            <button type="button" onclick="generador()">Generar</button>
        </form>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
